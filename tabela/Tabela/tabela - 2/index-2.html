<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000;
            color: white;
            margin: 10px;
            padding: 10px;
        }

        h1 {
            text-align: center;
        }

        table {
            border: 1px solid #fff;
            border-collapse: collapse;
            margin: 10px auto;
            padding: 10px;
            min-width: 300px;
            min-height: 400px;
        }

        tr, td {
            border: 1px solid white;
        }

        tr, th {
            text-align: center;
        }

        th {
            background-color: red;
            color: aliceblue;
        }

        #a-1 {
            background-color: maroon;
            color: beige;
        }

        #a-2 img {
            border: 2px solid #ff00dd;
            border-radius: 100%;
        }

        #a-2 img:hover {
            border: 2px solid yellow;
            transition: cubic-bezier(0.075, 0.82, 0.165, 1);
        }

        main {
            background-color: darkgrey;
            color: white;
            margin: 10px;
            padding: 10px;
        }

        h2 {
            text-align: center;
        }

        main > table {
            border: 1px solid #000;
            border-collapse: collapse;
            margin: 10px auto;
            padding: 10px;
            min-width: 300px;
            min-height: 400px;
        }

        main > table > tr td {
            border: 1px solid darkblue;
        }
    </style>
</head>
<body>
    <header>
        <h1>Imagens</h1>
        <table>
            <tr>
                <th>000</th>
                <th>111</th>
                <th>777</th>
                <th>888</th>

            </tr>
            <tr>
                <td id="a-1">A</td>

                <td id="a-2"><img src="/img/18.png" alt=""></td>
                <td id="a-2"><img src="/img/6.png" alt=""></td>
            </tr>
            <tr>
                <td id="a-1">B</td>
                <td id="a-2"><img src="/img/1.png" alt=""></td>
                <td id="a-2"><img src="/img/2.png" alt=""></td>
                <td id="a-2"><img src="/img/3.png" alt=""></td>
                <td id="a-2"><img src="/img/4.png" alt=""></td>
            </tr>
            <tr>
