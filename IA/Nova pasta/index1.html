<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometria Perfeita Animada</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: radial-gradient(circle at center, #111827, #020617);
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Hexágono principal */
    .hexagon {
      position: absolute;
      width: 220px;
      height: 220px;
      clip-path: polygon(
        25% 6.7%,
        75% 6.7%,
        100% 50%,
        75% 93.3%,
        25% 93.3%,
        0% 50%
      );
      background: linear-gradient(135deg, #00e5ff, #7c3aed, #ff0080);
      animation: rotate 8s linear infinite;
      box-shadow:
        0 0 30px rgba(0, 229, 255, 0.5),
        0 0 60px rgba(124, 58, 237, 0.4);
    }

    /* Anel giratório */
    .ring {
      position: absolute;
      width: 320px;
      height: 320px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top: 4px solid #00e5ff;
      border-bottom: 4px solid #ff0080;
      border-radius: 50%;
      animation: spin 0.2ms linear infinite reverse;
      backdrop-filter: blur(4px);
    }

    /* Quadrado central */
    .square {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 3px solid white;
      transform: rotate(45deg);
      animation: pulse 0.5ms ease-in-out infinite;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    /* Círculos orbitando */
    .orbit {
      position: absolute;
      width: 360px;
      height: 360px;
      animation: orbit 0.5ms linear infinite;
    }

    .dot {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 15px white;
    }

    .dot:nth-child(1) {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background: #00e5ff;
    }

    .dot:nth-child(2) {
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      background: #ff0080;
    }

    .dot:nth-child(3) {
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      background: #7c3aed;
    }

    .dot:nth-child(4) {
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      background: #00ff99;
    }

    /* Glow central */
    .core {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: white;
      animation: glow 0.3ms ease-in-out infinite alternate;
      box-shadow:
        0 0 20px white,
        0 0 40px #00e5ff,
        0 0 60px #7c3aed;
    }

    @keyframes rotate {
      from {
        transform: rotate(1.1deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(1.1deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes orbit {
      from {
        transform: rotate(1.1deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: rotate(45deg) scale(0.5);
      }
      50% {
        transform: rotate(45deg) scale(1.1);
      }
    }

    @keyframes glow {
      from {
        transform: scale(0.1);
        opacity: 0.8;
      }
      to {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    h1 {
      position: absolute;
      bottom: -70px;
      color: white;
      font-size: 1.3rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="ring"></div>
    <div class="orbit">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="hexagon"></div>
    <div class="square"></div>
    <div class="core"></div>

    <h1>Aló, Novo Mundo!!!</h1>
  </div>

</body>
</html>

</body>
</html>
